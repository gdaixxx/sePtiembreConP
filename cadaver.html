<html lang="es">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <header class="fondo">
 <br>
    </header>

    <main>
        <video muted playsinline id="video-fondo">
    <source src="./assets/videos/zombi.mp4" type="video/mp4">
    Tu navegador no soporta videos realistas.
</video>


<!-- <audio id="sonido-final">
    <source src="tu-sonido.mp3" type="audio/mpeg">
</audio> -->
<audio id="sonido-aldeano">
    <source src="./assets/sounds/aldeano.mp3" type="audio/mpeg">
</audio>


<form onsubmit="acumularVerso(event)">
    <input class="form-control" id="nuevo-verso" type="text" autocomplete="off" placeholder="Escribí acá lo primero que se te ocurra..."/>

    <div id="alertas">

    </div>
 
    <div class="tools">
        <button
            type="submit"
            class="btn btn-primary"
            id="continuar"
            type="button"
        >
            Continuar
        </button>
    
        <button
            class="btn btn-primary"
            role="button"
            onclick="terminarPoema()"
            id="terminar"
            type="button"
            >Terminar</button
        >
        
        <input type="number" class="form-control"  name="" value="1" id="copias">
        
        <button
            class="btn btn-primary"
            role="button"
            onclick="imprimirCadaver()"
            type="button"
            id="imprimir"
            disabled
            >Imprimir</button>

                  <button
            class="btn btn-primary"
            role="button"
            onclick="nuevoPoema()"
            type="button"
            id="nuevo-poema"
            disabled
            >Nuevo</button>


        <div class="form-check">
      <input class="form-check-input" type="checkbox" value="" id="anonimo" checked>
      <label class="form-check-label" for="checkChecked">
        Anónimo
      </label>
    </div>
    </div>


</form>
<hr>
<div class="poema-container d-none" id="poema-container">
    <h3 id="titulo-seccion"></h3>
    <div id="ultimo-verso">    </div>
    <div class="poema" id="poema-terminado" hidden>
    </div>
</div>

    </main>

    <footer>

    </footer>
</body>
</html>
